<script>

const formatoCOP = new Intl.NumberFormat('es-CO',{
    style:'currency',
    currency:'COP',
    maximumFractionDigits:0
});

function seleccionarPlan(){

    const plan=document.getElementById("planCredito").value;

    if(plan===""){
        document.getElementById("plazo").value="";
        document.getElementById("interes").value="";
        calcular();
        return;
    }

    const datos=plan.split("|");

    document.getElementById("plazo").value=datos[0];
    document.getElementById("interes").value=datos[1];

    calcular();

}

function calcular(){

    const valor=parseFloat(document.getElementById("valor").value)||0;

    const interes=parseFloat(document.getElementById("interes").value)||0;

    const plazo=parseInt(document.getElementById("plazo").value)||0;

    const valorInteres=valor*interes/100;

    const total=valor+valorInteres;

    document.getElementById("valorSolicitado").innerText=formatoCOP.format(valor);

    document.getElementById("valorInteres").innerHTML =
    interes > 0
    ? `${formatoCOP.format(valorInteres)} <br><small>(${interes}%)</small>`
    : "$0";

    document.getElementById("valorTotal").innerText=formatoCOP.format(total);

    document.getElementById("plazoTexto").innerText=
        plazo>0
        ? plazo+" días"
        : "-";

}

function enviarWhatsApp(){

    const nombres=document.getElementById('nombres').value.trim();
    const apellidos=document.getElementById('apellidos').value.trim();
    const direccion=document.getElementById('direccion').value.trim();
    const cedula=document.getElementById('cedula').value.trim();
    const telefono=document.getElementById('telefono').value.trim();
    const empresa=document.getElementById('empresa').value.trim();
    const direccionEmpresa=document.getElementById('direccionEmpresa').value.trim();

    const valor=parseFloat(document.getElementById('valor').value)||0;
    const interes=parseFloat(document.getElementById('interes').value)||0;
    const plazo=parseInt(document.getElementById('plazo').value)||0;

    if(!nombres || !apellidos || !cedula || !telefono || !valor || !plazo){

        alert("Complete todos los campos y seleccione un plan.");

        return;

    }

    const valorInteres=valor*interes/100;
    const total=valor+valorInteres;

    const mensaje=`SOLICITUD DE CRÉDITO

Nombres: ${nombres}
Apellidos: ${apellidos}
Cédula: ${cedula}
Teléfono: ${telefono}
Dirección: ${direccion}

Empresa: ${empresa}
Dirección Empresa: ${direccionEmpresa}

Valor Solicitado: ${formatoCOP.format(valor)}
Interés: ${interes}%
Valor Interés: ${formatoCOP.format(valorInteres)}
Total a Pagar: ${formatoCOP.format(total)}
Plazo: ${plazo} días`;

    fetch(
    "https://script.google.com/macros/s/AKfycbz0ithgLG2jt97B4yyZe90UgmDRAt30p95D3iXBcz5XXdI1J_kW-LLt57Pry_XDIVft/exec",
    {
        method:"POST",
        body:JSON.stringify({
            nombres,
            apellidos,
            cedula,
            telefono,
            direccion,
            empresa,
            direccionEmpresa,
            valor,
            interes,
            total,
            plazo
        })
    });

    window.open(
        `https://wa.me/573241294986?text=${encodeURIComponent(mensaje)}`,
        "_blank"
    );

}

seleccionarPlan();

</script>
